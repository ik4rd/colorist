name: desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: colorist-macos
          - os: windows-latest
            platform: windows/amd64
            artifact: colorist-windows
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: colorist-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }} -clean

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/build/bin/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/build/bin/*
