name: desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: colorist-macos
            tags: ""
            package: "dist/*"
          - os: windows-latest
            platform: windows/amd64
            artifact: colorist-windows
            tags: ""
            package: "desktop/build/bin/*"
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: colorist-linux
            tags: "webkit2_41"
            package: "desktop/build/bin/*"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install Linux WebView deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }} -clean -tags "${{ matrix.tags }}"

      - name: Package macOS DMG
        if: runner.os == 'macOS'
        run: scripts/macos-dmg.sh desktop/build/bin/colorist.app "${GITHUB_REF_NAME//\//-}" dist

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.package }}
